name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-msi:
    name: Build Windows Desktop
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build MSI (artifact only)
        run: npm run desktop:msi
        env:
          LINGXIAO_SKIP_MODELS_SNAPSHOT: "1"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingXiao-Windows-MSI
          path: release/desktop/*.msi
          if-no-files-found: error

      # ── Publish: tag 触发时构建 NSIS 安装包并发布到 GitHub Releases ──
      # NSIS + latest.yml 是 electron-updater 自动更新所需的格式。
      # MSI 不支持 electron-updater 的差量更新，所以用 NSIS 作为自动更新渠道。
      - name: Publish NSIS to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v') && env.ACT != 'true'
        run: npm run desktop:publish
        env:
          LINGXIAO_SKIP_MODELS_SNAPSHOT: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
