version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      root-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      web-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
